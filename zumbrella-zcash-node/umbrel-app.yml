manifestVersion: 1.1
id: zumbrella-zcash-node
name: "Zebra - Zcash Node"
tagline: "Run a Zcash full node and light wallet server"
version: "1.5.1"
category: finance
icon: https://raw.githubusercontent.com/LimitlessPunk/zumbrella-app-store/main/zumbrella-zcash-node/icon.svg
port: 3700
path: ""
description: >-
  Run your own Zcash full node powered by Zebra (zebrad), the modern Rust-based
  node implementation by the Zcash Foundation. Includes a light wallet server
  (lightwalletd) so you can connect mobile wallets like Zashi, YWallet, and
  ZingoWallet directly to your own node.


  Features:

  - Full Zcash blockchain validation and sync

  - Light wallet server (lightwalletd) for mobile wallet connections

  - Web dashboard with sync progress, peer info, and network stats

  - Tor hidden services for private RPC, P2P, and gRPC access


  Requirements:

  - 500 GB+ SSD storage (HDD will not work)

  - Initial sync takes 9 hours to 3 days depending on hardware

  - 4 GB RAM minimum, 8 GB recommended
dependencies: []
permissions: []
widgets:
  - id: "stats"
    type: "four-stats"
    refresh: "5s"
    endpoint: "app:3700/api/widget/stats"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Connections"
          text: "8"
          subtext: "peers"
        - title: "Block Height"
          text: "2,450,000"
          subtext: "blocks"
        - title: "Mempool"
          text: "12"
          subtext: "txs"
        - title: "Network"
          text: "Mainnet"
          subtext: ""
  - id: "sync"
    type: "text-with-progress"
    refresh: "2s"
    endpoint: "app:3700/api/widget/sync"
    link: ""
    example:
      type: "text-with-progress"
      link: ""
      title: "Blockchain sync"
      text: "83%"
      progressLabel: "In progress"
      progress: 0.83
  - id: "mining"
    type: "four-stats"
    refresh: "5s"
    endpoint: "app:3700/api/widget/mining"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Network Hashrate"
          text: "8.45 GSol/s"
          subtext: ""
        - title: "Difficulty"
          text: "130.5M"
          subtext: ""
        - title: "Block Reward"
          text: "3.1250 ZEC"
          subtext: "per block"
        - title: "Block Height"
          text: "2450000"
          subtext: "blocks"
backupIgnore:
  - "data/zebrad/**"
  - "data/lightwalletd/**"
gallery:
  - https://raw.githubusercontent.com/LimitlessPunk/zumbrella-app-store/main/zumbrella-zcash-node/gallery/1.png
  - https://raw.githubusercontent.com/LimitlessPunk/zumbrella-app-store/main/zumbrella-zcash-node/gallery/2.png
  - https://raw.githubusercontent.com/LimitlessPunk/zumbrella-app-store/main/zumbrella-zcash-node/gallery/3.png
developer: "LimitlessPunk"
website: "https://z.cash"
repo: "https://github.com/LimitlessPunk/Zumbrella"
support: "https://github.com/LimitlessPunk/Zumbrella/issues"
submitter: "LimitlessPunk"
submission: ""
defaultUsername: ""
defaultPassword: ""
deterministicPassword: true
torOnly: false
installSize: 500000
releaseNotes: >-
  World map fix and responsive layout:
    - World map now shows real continent outlines (Natural Earth data) instead of placeholder shapes
    - Dashboard widened from 672px to 896px max for better use of screen space
    - All pages are now mobile-responsive — data grids collapse to single column on small screens
    - Peer table hides less-critical columns (Client, Ping) on mobile
    - Navigation tabs scroll horizontally on narrow screens
    - Settings grid adapts to single column on mobile
