manifestVersion: 1.1
id: zumbrella-zcash-node
name: "Zolo"
tagline: "Self-host your privacy"
version: "1.30.0"
category: finance
icon: https://raw.githubusercontent.com/LimitlessPunk/zumbrella-app-store/main/zumbrella-zcash-node/icon.png
port: 3700
path: ""
description: >-
  Zolo is a self-hosted Zcash full node powered by Zebra (zebrad), the modern
  Rust-based node implementation by the Zcash Foundation. Includes a light wallet
  server (lightwalletd) so you can connect mobile wallets like Zashi, YWallet,
  and ZingoWallet directly to your own node.


  Features:

  - Full Zcash blockchain validation and sync

  - Light wallet server (lightwalletd) for mobile wallet connections

  - Web dashboard with sync progress, peer info, and network stats

  - Tor hidden services for private RPC, P2P, and gRPC access


  Requirements:

  - 500 GB+ SSD storage (HDD will not work)

  - Initial sync takes 9 hours to 3 days depending on hardware

  - 4 GB RAM minimum, 8 GB recommended
dependencies: []
permissions: []
widgets:
  - id: "stats"
    type: "four-stats"
    refresh: "5s"
    endpoint: "app:3700/api/widget/stats"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Connections"
          text: "8"
          subtext: "peers"
        - title: "Block Height"
          text: "2,450,000"
          subtext: "blocks"
        - title: "Mempool"
          text: "12"
          subtext: "txs"
        - title: "Network"
          text: "Mainnet"
          subtext: ""
  - id: "sync"
    type: "text-with-progress"
    refresh: "2s"
    endpoint: "app:3700/api/widget/sync"
    link: ""
    example:
      type: "text-with-progress"
      link: ""
      title: "Blockchain sync"
      text: "83%"
      progressLabel: "In progress"
      progress: 0.83
  - id: "mining"
    type: "four-stats"
    refresh: "5s"
    endpoint: "app:3700/api/widget/mining"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Network Hashrate"
          text: "8.45 GSol/s"
          subtext: ""
        - title: "Difficulty"
          text: "130.5M"
          subtext: ""
        - title: "Block Reward"
          text: "3.1250 ZEC"
          subtext: "per block"
        - title: "Block Height"
          text: "2450000"
          subtext: "blocks"
backupIgnore:
  - "data/zebrad/**"
  - "data/lightwalletd/**"
  - "data/wallet-sidecar/**"
gallery:
  - https://raw.githubusercontent.com/LimitlessPunk/zumbrella-app-store/main/zumbrella-zcash-node/gallery/1.png
  - https://raw.githubusercontent.com/LimitlessPunk/zumbrella-app-store/main/zumbrella-zcash-node/gallery/2.png
  - https://raw.githubusercontent.com/LimitlessPunk/zumbrella-app-store/main/zumbrella-zcash-node/gallery/3.png
developer: "LimitlessPunk"
website: "https://z.cash"
repo: "https://github.com/LimitlessPunk/Zumbrella"
support: "https://github.com/LimitlessPunk/Zumbrella/issues"
submitter: "LimitlessPunk"
submission: ""
defaultUsername: ""
defaultPassword: ""
deterministicPassword: true
torOnly: false
installSize: 500000
releaseNotes: >-
  Fix wallet birthday height bug + broken transactions:
    - Fix block interval from 75s to 90s in date-to-height calculation — was causing all date presets to overshoot, making wallet birthday too recent and missing transactions
    - Add 1000-block safety margin to birthday height estimates
    - Fix SQL column names (received_total→total_received, sent_total→total_spent) so transactions endpoint works
    - Fix pool type reading (integer→string mapping) for correct pool identification
    - Increase scanner stop timeout from 5s to 30s to prevent DB corruption on rewind/rescan
    - Sort scan ranges by priority so important ranges are processed first
    - Guard against underflow when scan range start >= end
