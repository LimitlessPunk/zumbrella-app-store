volumes:
  logs:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=50m

services:
  app_proxy:
    environment:
      APP_HOST: ${APP_ZUMBRELLA_ZCASH_NODE_WEB_IP}
      APP_PORT: 3700
      PROXY_AUTH_ADD: "true"

  zebrad:
    image: zfnd/zebra:4.1.0@sha256:9e82f1029527183ec5bf691bd9b8eae61357bf439d33f3f7dfcb0dba5ea7d760
    restart: on-failure
    stop_grace_period: 15m30s
    command: ["sh", "-c", "exec zebrad start 2>&1 | tee /shared-logs/zebrad.log"]
    volumes:
      - ${APP_DATA_DIR}/data/zebrad:/home/zebra/.cache/zebra
      - logs:/shared-logs
    environment:
      ZEBRA_NETWORK__NETWORK: "Mainnet"
      ZEBRA_RPC__LISTEN_ADDR: "0.0.0.0:8232"
      ZEBRA_RPC__ENABLE_COOKIE_AUTH: "false"
      ZEBRA_NETWORK__LISTEN_ADDR: "0.0.0.0:${APP_ZUMBRELLA_ZCASH_NODE_P2P_PORT:-8233}"
      ZEBRA_STATE__CACHE_DIR: "/home/zebra/.cache/zebra"
      ZEBRA_MINING__MINER_ADDRESS: "${APP_ZUMBRELLA_ZCASH_NODE_MINER_ADDRESS:-t3dvVE3SQEi7kqNzwrfNePxZ1d4hUyztBA1}"
      ZEBRA_NETWORK__PEERSET_INITIAL_TARGET_SIZE: "${APP_ZUMBRELLA_ZCASH_NODE_MAX_CONNECTIONS:-25}"
      ZEBRA_SYNC__LOOKAHEAD_LIMIT: "256"
      ZEBRA_SYNC__MAX_CONCURRENT_BLOCK_REQUESTS: "${APP_ZUMBRELLA_ZCASH_NODE_SYNC_CONCURRENCY:-8}"
      ZEBRA_RPC__PARALLEL_CPU_THREADS: "1"
      RUST_LOG: "${APP_ZUMBRELLA_ZCASH_NODE_LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"getinfo\",\"params\":[],\"id\":1}", "http://127.0.0.1:8232"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 10m
    networks:
      default:
        ipv4_address: $APP_ZUMBRELLA_ZCASH_NODE_ZEBRAD_IP

  lightwalletd:
    image: mycousiinvinny/lightwalletd:arm64@sha256:abc619469e34ffc1f482fa058e8872895724d80c0b92c7ba70aa1ff2a1eb859f
    user: "1000:1000"
    restart: on-failure
    depends_on:
      zebrad:
        condition: service_healthy
    command:
      - --grpc-bind-addr=0.0.0.0:9067
      - --rpchost=${APP_ZUMBRELLA_ZCASH_NODE_ZEBRAD_IP}
      - --rpcport=8232
      - --no-tls-very-insecure
      - --log-file=/shared-logs/lightwalletd.log
      - --data-dir=/var/lib/lightwalletd/db
      - --zcash-conf-path=/var/lib/lightwalletd/zcash.conf
    volumes:
      - ${APP_DATA_DIR}/data/lightwalletd:/var/lib/lightwalletd
      - logs:/shared-logs
    networks:
      default:
        ipv4_address: $APP_ZUMBRELLA_ZCASH_NODE_LIGHTWALLETD_IP

  web:
    image: ghcr.io/limitlesspunk/zumbrella-web:v1.11.0@sha256:8bf6162aa247c460c6caaf6e6a1732b24c6fd95ad7f9f5f7627af010bacce74d
    user: "1000:1000"
    restart: on-failure
    depends_on:
      - zebrad
    environment:
      ZEBRAD_RPC_URL: "http://${APP_ZUMBRELLA_ZCASH_NODE_ZEBRAD_IP}:8232"
      LIGHTWALLETD_ONION: "${APP_ZUMBRELLA_ZCASH_NODE_GRPC_HIDDEN_SERVICE}"
      LIGHTWALLETD_HOST: "${APP_ZUMBRELLA_ZCASH_NODE_LIGHTWALLETD_IP}"
      LIGHTWALLETD_PORT: "9067"
      TOR_HOST: "${APP_ZUMBRELLA_ZCASH_NODE_TOR_IP}"
      PORT: "3700"
      SETTINGS_FILE: "/data/settings/settings.json"
    volumes:
      - logs:/shared-logs:ro
      - ${APP_DATA_DIR}/data/settings:/data/settings
    networks:
      default:
        ipv4_address: $APP_ZUMBRELLA_ZCASH_NODE_WEB_IP

  tor:
    image: getumbrel/tor:0.4.7.8@sha256:2ace83f22501f58857fa9b403009f595137fa2e7986c4fda79d82a8119072b6a
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/torrc:/etc/tor/torrc:ro
      - ${TOR_DATA_DIR}:/data
    environment:
      HOME: "/tmp"
    networks:
      default:
        ipv4_address: $APP_ZUMBRELLA_ZCASH_NODE_TOR_IP
